spring:
  application:
    name: digital-asset-risk-platform

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

fds:
  evaluation:
    mode: ${FDS_EVALUATION_MODE:sync}

outbox:
  publisher:
    fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}

app:
  kafka:
    consumer:
      group:
        fds-withdrawal: fds-withdrawal-consumer
        audit-log: audit-log-consumer
        admin-notification: admin-notification-consumer
        rule-statistics: rule-statistics-consumer
        user-risk-profile-evaluation: user-risk-profile-evaluation-consumer
        user-risk-profile-case: user-risk-profile-case-consumer