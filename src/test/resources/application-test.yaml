spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

outbox:
  publisher:
    fixed-delay-ms: 600000

fds:
  evaluation:
    mode: sync

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace