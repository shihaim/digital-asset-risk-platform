spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  kafka:
    listener:
      auto-startup: false

fds:
  evaluation:
    mode: sync

outbox:
  publisher:
    fixed-delay-ms: 600000

logging:
  level:
    root: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.testcontainers: INFO
    com.example.digital_asset_risk_platform: INFO